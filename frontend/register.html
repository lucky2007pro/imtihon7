<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish - Kutubxona</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="toast-container"></div>
    
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <i data-lucide="library"></i>
            <span>Kutubxona</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Bosh sahifa</a>
            <a href="catalog.html">Kitoblar</a>
        </div>
        <div class="nav-auth" id="nav-auth-section"></div>
    </nav>

    <main id="app-root">
        <div class="auth-container animate-fade-in">
            <h2 class="auth-title">Ro'yxatdan o'tish</h2>
            <p class="auth-subtitle" id="step-subtitle">Yangi hisob yaratish</p>
            
            <!-- Step 1: Email/Phone -->
            <form id="step1-form" onsubmit="event.preventDefault(); handleSignup(event, this); return false;">
                <div class="form-group">
                    <label class="form-label">Email yoki Telefon raqami</label>
                    <input type="text" name="email_or_phone" class="form-input" required placeholder="m@example.com yoki +998901234567">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                    Ro'yxatdan o'tish (Kod yuborish)
                </button>
            </form>

            <!-- Step 2: Verification Code -->
            <form id="step2-form" onsubmit="event.preventDefault(); handleVerify(event, this); return false;" style="display: none;">
                <div class="form-group">
                    <label class="form-label">Tasdiqlash kodi</label>
                    <input type="text" name="code" class="form-input" required placeholder="Pochtangizga kelgan kodni kiriting">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                    Kodni tasdiqlash
                </button>
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="#" onclick="handleResend(event)" style="color: var(--text-secondary); font-size: 0.9rem; text-decoration: underline;">Kodni qayta yuborish</a>
                </div>
            </form>

            <!-- Step 3: Complete Profile -->
            <form id="step3-form" onsubmit="event.preventDefault(); handleComplete(event, this); return false;" style="display: none;">
                <div class="form-group">
                    <label class="form-label">Ism</label>
                    <input type="text" name="first_name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Familiya</label>
                    <input type="text" name="last_name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Rolingiz</label>
                    <select name="user_role" class="form-input" required style="background: var(--bg-color);" onchange="handleRoleChange(this.value)">
                        <option value="ordinary_user">Kitobxon</option>
                        <option value="librarian">Kutubxonachi</option>
                    </select>
                </div>
                
                <div id="librarian-fields" style="display: none; padding: 1.5rem; background: rgba(59, 130, 246, 0.1); border-radius: 12px; margin-bottom: 1.5rem; border: 1px dashed var(--accent-primary);">
                    <h4 style="margin-bottom: 1rem; color: var(--accent-primary);">Kutubxona Ma'lumotlari</h4>
                    <div class="form-group">
                        <label class="form-label">Kutubxona Nomi</label>
                        <input type="text" name="library_name" id="library_name" class="form-input" placeholder="Navoiy nomidagi kutubxona">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Joylashuv / Manzil</label>
                        <input type="text" name="library_location" id="library_location" class="form-input" placeholder="Toshkent, Chilonzor">
                    </div>
                    <div class="form-group" style="display: flex; gap: 1rem; align-items: flex-end;">
                        <div style="flex: 1;">
                            <label class="form-label">Kenglik (Lat)</label>
                            <input type="text" name="library_lat" id="library_lat" class="form-input" readonly placeholder="Avtomatik">
                        </div>
                        <div style="flex: 1;">
                            <label class="form-label">Uzunlik (Lng)</label>
                            <input type="text" name="library_lng" id="library_lng" class="form-input" readonly placeholder="Avtomatik">
                        </div>
                        <button type="button" class="btn-outline" onclick="getLocation()" style="padding: 0.75rem;">
                            <i data-lucide="map-pin"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Parol</label>
                    <input type="password" name="password" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Parolni takrorlang</label>
                    <input type="password" name="confirm_password" class="form-input" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                    Profilni saqlash
                </button>
            </form>
            
            <div id="auth-footer" style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-secondary);">
                Hisobingiz bormi? <a href="login.html" style="color: var(--accent-primary);">Kirish</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 TATU Kutubxona. Barcha huquqlar himoyalangan.</p>
    </footer>

    <script src="js/app.js?v=10"></script>
    <script>
        let currentEmailOrPhone = '';

        function handleRoleChange(role) {
            const libFields = document.getElementById('librarian-fields');
            if (role === 'librarian') {
                libFields.style.display = 'block';
                document.getElementById('library_name').required = true;
                document.getElementById('library_location').required = true;
                document.getElementById('library_lat').required = true;
                document.getElementById('library_lng').required = true;
            } else {
                libFields.style.display = 'none';
                document.getElementById('library_name').required = false;
                document.getElementById('library_location').required = false;
                document.getElementById('library_lat').required = false;
                document.getElementById('library_lng').required = false;
            }
        }
        
        function getLocation() {
            if (navigator.geolocation) {
                app.showToast("Joylashuv aniqlanmoqda...", "success");
                navigator.geolocation.getCurrentPosition((position) => {
                    document.getElementById('library_lat').value = position.coords.latitude;
                    document.getElementById('library_lng').value = position.coords.longitude;
                    app.showToast("Joylashuv muvaffaqiyatli olindi!", "success");
                }, (error) => {
                    app.showToast("Joylashuvni aniqlashda xatolik. Brauzerda ruxsat bering.", "error");
                });
            } else {
                app.showToast("Brauzeringiz xaritani qo'llab-quvvatlamaydi.", "error");
            }
        }

        async function handleSignup(event, form) {
            event.preventDefault();
            const btn = form.querySelector('button');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Kutilmoqda...';
            lucide.createIcons();
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            currentEmailOrPhone = data.email_or_phone;
            
            try {
                await app.apiCall('/accounts/signup/', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                app.showToast("Kod yuborildi!", "success");
                
                document.getElementById('step1-form').style.display = 'none';
                document.getElementById('step2-form').style.display = 'block';
                document.getElementById('step-subtitle').textContent = "Pochtangizga yuborilgan tasdiqlash kodini kiriting";
                document.getElementById('auth-footer').style.display = 'none';
            } catch (error) {
                btn.innerHTML = originalBtnHtml;
            }
        }

        async function handleVerify(event, form) {
            event.preventDefault();
            const btn = form.querySelector('button');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Kutilmoqda...';
            lucide.createIcons();
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            data.email_or_phone = currentEmailOrPhone;
            
            try {
                const res = await app.apiCall('/accounts/verify/', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                
                app.token = typeof res.data.token === 'object' ? res.data.token.access : res.data.token;
                localStorage.setItem('token', app.token);
                app.updateNav();
                app.showToast("Kod tasdiqlandi. Endi profilingizni to'ldiring.", "success");
                
                document.getElementById('step2-form').style.display = 'none';
                document.getElementById('step3-form').style.display = 'block';
                document.getElementById('step-subtitle').textContent = "Shaxsiy ma'lumotlaringizni to'ldiring";
            } catch (error) {
                btn.innerHTML = originalBtnHtml;
            }
        }

        async function handleComplete(event, form) {
            event.preventDefault();
            const btn = form.querySelector('button');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Kutilmoqda...';
            lucide.createIcons();
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            
            try {
                await app.apiCall('/accounts/complete-profile/', {
                    method: 'PUT',
                    body: JSON.stringify(data)
                });
                
                app.showToast("Muvaffaqiyatli ro'yxatdan o'tdingiz!", "success");
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } catch (error) {
                btn.innerHTML = originalBtnHtml;
            }
        }

        async function handleResend(event) {
            event.preventDefault();
            const resendLink = event.target;
            const originalText = resendLink.innerText;
            resendLink.innerText = 'Yuborilmoqda...';
            resendLink.style.pointerEvents = 'none';

            try {
                await app.apiCall('/accounts/new-code/', {
                    method: 'POST',
                    body: JSON.stringify({ email_or_phone: currentEmailOrPhone })
                });
                app.showToast("Yangi kod yuborildi!", "success");
            } catch (error) {
                // Error is handled by apiCall
            } finally {
                resendLink.innerText = originalText;
                resendLink.style.pointerEvents = 'auto';
            }
        }
    </script>
</body>
</html>
