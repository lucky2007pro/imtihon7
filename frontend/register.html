<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish - Kutubxona</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="toast-container"></div>
    
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <i data-lucide="library"></i>
            <span>Kutubxona</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Bosh sahifa</a>
            <a href="catalog.html">Kitoblar</a>
        </div>
        <div class="nav-auth" id="nav-auth-section"></div>
    </nav>

    <main id="app-root">
        <div class="auth-container animate-fade-in">
            <h2 class="auth-title">Ro'yxatdan o'tish</h2>
            <p class="auth-subtitle" id="step-subtitle">Yangi hisob yaratish</p>
            
            <!-- Step 1: Email/Phone -->
            <form id="step1-form" onsubmit="event.preventDefault(); handleSignup(event, this); return false;">
                <div class="form-group">
                    <label class="form-label">Email yoki Telefon raqami</label>
                    <input type="text" name="email_or_phone" class="form-input" required placeholder="m@example.com yoki +998901234567">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                    Ro'yxatdan o'tish (Kod yuborish)
                </button>
            </form>

            <!-- Step 2: Verification Code -->
            <form id="step2-form" onsubmit="event.preventDefault(); handleVerify(event, this); return false;" style="display: none;">
                <div class="form-group">
                    <label class="form-label">Tasdiqlash kodi</label>
                    <input type="text" name="code" class="form-input" required placeholder="Pochtangizga kelgan kodni kiriting">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                    Kodni tasdiqlash
                </button>
            </form>

            <!-- Step 3: Complete Profile -->
            <form id="step3-form" onsubmit="event.preventDefault(); handleComplete(event, this); return false;" style="display: none;">
                <div class="form-group">
                    <label class="form-label">Ism</label>
                    <input type="text" name="first_name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Familiya</label>
                    <input type="text" name="last_name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Rolingiz</label>
                    <select name="user_role" class="form-input" required style="background: var(--bg-color);">
                        <option value="student">Talaba</option>
                        <option value="teacher">O'qituvchi</option>
                        <option value="other">Boshqa</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Parol</label>
                    <input type="password" name="password" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Parolni takrorlang</label>
                    <input type="password" name="confirm_password" class="form-input" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                    Profilni saqlash
                </button>
            </form>
            
            <div id="auth-footer" style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-secondary);">
                Hisobingiz bormi? <a href="login.html" style="color: var(--accent-primary);">Kirish</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 TATU Kutubxona. Barcha huquqlar himoyalangan.</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        let currentEmailOrPhone = '';

        async function handleSignup(event, form) {
            event.preventDefault();
            const btn = form.querySelector('button');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Kutilmoqda...';
            lucide.createIcons();
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            currentEmailOrPhone = data.email_or_phone;
            
            try {
                await app.apiCall('/accounts/signup/', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                app.showToast("Kod yuborildi!", "success");
                
                document.getElementById('step1-form').style.display = 'none';
                document.getElementById('step2-form').style.display = 'block';
                document.getElementById('step-subtitle').textContent = "Pochtangizga yuborilgan tasdiqlash kodini kiriting";
                document.getElementById('auth-footer').style.display = 'none';
            } catch (error) {
                btn.innerHTML = originalBtnHtml;
            }
        }

        async function handleVerify(event, form) {
            event.preventDefault();
            const btn = form.querySelector('button');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Kutilmoqda...';
            lucide.createIcons();
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            data.email_or_phone = currentEmailOrPhone;
            
            try {
                const res = await app.apiCall('/accounts/verify/', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                
                app.token = res.data.token;
                localStorage.setItem('token', app.token);
                app.updateNav();
                app.showToast("Kod tasdiqlandi. Endi profilingizni to'ldiring.", "success");
                
                document.getElementById('step2-form').style.display = 'none';
                document.getElementById('step3-form').style.display = 'block';
                document.getElementById('step-subtitle').textContent = "Shaxsiy ma'lumotlaringizni to'ldiring";
            } catch (error) {
                btn.innerHTML = originalBtnHtml;
            }
        }

        async function handleComplete(event, form) {
            event.preventDefault();
            const btn = form.querySelector('button');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i> Kutilmoqda...';
            lucide.createIcons();
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            
            try {
                await app.apiCall('/accounts/complete-profile/', {
                    method: 'PUT',
                    body: JSON.stringify(data)
                });
                
                app.showToast("Muvaffaqiyatli ro'yxatdan o'tdingiz!", "success");
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } catch (error) {
                btn.innerHTML = originalBtnHtml;
            }
        }
    </script>
</body>
</html>
