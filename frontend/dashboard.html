<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Kutubxona</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="toast-container"></div>
    
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <i data-lucide="library"></i>
            <span>Kutubxona</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Bosh sahifa</a>
            <a href="catalog.html">Kitoblar</a>
        </div>
        <div class="nav-auth" id="nav-auth-section"></div>
    </nav>

    <main id="app-root" class="animate-fade-in">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2 style="font-size: 2rem; margin-bottom: 2rem;">Mening Profilim</h2>
            
            <div style="background: var(--surface-color); padding: 2rem; border-radius: 16px; border: 1px solid var(--glass-border); margin-bottom: 2rem;">
                <div style="display: flex; align-items: center; gap: 1.5rem;">
                    <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--surface-hover); display: flex; align-items: center; justify-content: center;">
                        <i data-lucide="user" style="width: 40px; height: 40px; color: var(--text-secondary);"></i>
                    </div>
                    <div>
                        <h3 id="profile-name" style="font-size: 1.5rem; margin-bottom: 0.25rem;">Foydalanuvchi</h3>
                        <p id="profile-email" style="color: var(--text-secondary);">Yuklanmoqda...</p>
                    </div>
                </div>
            </div>

            <div id="dynamic-content">
                <h3 style="margin-bottom: 1rem;">Band qilingan kitoblar</h3>
                <div style="background: var(--surface-color); border-radius: 16px; border: 1px solid var(--glass-border); padding: 2rem; text-align: center; color: var(--text-secondary);">
                    Hozircha band qilingan kitoblar yo'q.
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 TATU Kutubxona. Barcha huquqlar himoyalangan.</p>
    </footer>

    <script src="js/app.js?v=10"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!app.token) {
                app.showToast("Avval tizimga kiring", "error");
                setTimeout(() => window.location.href = 'login.html', 1000);
                return;
            }

            try {
                const response = await app.apiCall('/accounts/profile/');
                const user = response.data;
                
                document.getElementById('profile-name').textContent = `${user.first_name || 'Foydalanuvchi'} ${user.last_name || ''}`;
                document.getElementById('profile-email').textContent = user.email || user.phone_number || '';
                
                const contentDiv = document.getElementById('dynamic-content');
                if (user.user_role === 'librarian') {
                    if (!user.is_approved) {
                        contentDiv.innerHTML = `
                            <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--error-color); border-radius: 16px; padding: 2rem; text-align: center; color: var(--error-color);">
                                <i data-lucide="clock" style="width: 48px; height: 48px; margin-bottom: 1rem;"></i>
                                <h3 style="margin-bottom: 0.5rem;">Tasdiqlanish Kutilmoqda</h3>
                                <p>Sizning kutubxonachi profilingiz hozircha admin tomonidan tasdiqlanmagan. Iltimos, kuting.</p>
                            </div>
                        `;
                    } else {
                        contentDiv.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                <h3>Kutubxona Inventari</h3>
                                <button class="btn-primary" onclick="openAddBookModal()">
                                    <i data-lucide="plus"></i> Kitob qo'shish
                                </button>
                            </div>
                            <div id="inventory-list" style="background: var(--surface-color); border-radius: 16px; border: 1px solid var(--glass-border); padding: 2rem; text-align: center; color: var(--text-secondary);">
                                Yuklanmoqda...
                            </div>
                        `;
                        loadInventory(user.library_name);
                    }
                    lucide.createIcons();
                }
            } catch (error) {
                // if token is invalid
                app.logout();
            }
        });

        // Add Book Modal logic
        async function loadInventory(libraryName) {
            try {
                const res = await app.apiCall('/accounts/profile/');
                // fetch inventory here if separate endpoint, actually let's fetch inventory!
                const invRes = await app.apiCall('/books/inventory/');
                const list = document.getElementById('inventory-list');
                if (invRes.data && invRes.data.results && invRes.data.results.length > 0) {
                    list.style.textAlign = 'left';
                    list.style.padding = '1rem';
                    list.innerHTML = invRes.data.results.map(item => `
                        <div style="display: flex; justify-content: space-between; padding: 1rem; border-bottom: 1px solid var(--glass-border);">
                            <div>
                                <strong>${item.book_title}</strong><br>
                                <small>Nusxalar: ${item.available_copies}</small>
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = `${libraryName} kutubxonasida hozircha kitoblar mavjud emas.`;
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function openAddBookModal() {
            const modal = document.getElementById('add-book-modal');
            modal.style.display = 'flex';
            
            // load books
            try {
                const res = await app.apiCall('/books/books/');
                const select = document.getElementById('book-select');
                if (res.data && res.data.results) {
                    select.innerHTML = '<option value="">Kitobni tanlang</option>' + res.data.results.map(b => `<option value="${b.id}">${b.title}</option>`).join('');
                }
            } catch (e) {
                app.showToast("Kitoblarni yuklashda xatolik", "error");
            }
        }

        function closeAddBookModal() {
            document.getElementById('add-book-modal').style.display = 'none';
        }

        async function submitAddBook(event) {
            event.preventDefault();
            const bookId = document.getElementById('book-select').value;
            const copies = document.getElementById('book-copies').value;
            
            if (!bookId || !copies) {
                app.showToast("Barcha maydonlarni to'ldiring", "error");
                return;
            }

            try {
                const submitBtn = event.target.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Saqlanmoqda...';

                await app.apiCall('/books/inventory/', 'POST', {
                    book: bookId,
                    available_copies: parseInt(copies)
                });
                
                app.showToast("Kitob muvaffaqiyatli qo'shildi!", "success");
                closeAddBookModal();
                
                // reload profile/inventory
                const res = await app.apiCall('/accounts/profile/');
                loadInventory(res.data.library_name);
            } catch (error) {
                app.showToast(error.message || "Xatolik yuz berdi", "error");
            } finally {
                const submitBtn = event.target.querySelector('button[type="submit"]');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Saqlash';
            }
        }
    </script>

    <!-- Modal HTML -->
    <div id="add-book-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
        <div style="background: var(--surface-color); padding: 2rem; border-radius: 16px; border: 1px solid var(--glass-border); width: 100%; max-width: 400px;">
            <h3 style="margin-top: 0;">Kitob qo'shish</h3>
            <form onsubmit="submitAddBook(event)">
                <div class="form-group">
                    <label>Kitobni tanlang</label>
                    <select id="book-select" required style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: white;">
                        <option value="">Yuklanmoqda...</option>
                    </select>
                </div>
                <div class="form-group" style="margin-top: 1rem;">
                    <label>Nusxalar soni</label>
                    <input type="number" id="book-copies" required min="1" value="1" style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: white;">
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="button" class="btn-secondary" style="flex: 1;" onclick="closeAddBookModal()">Bekor qilish</button>
                    <button type="submit" class="btn-primary" style="flex: 1;">Saqlash</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
