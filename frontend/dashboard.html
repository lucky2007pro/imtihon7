<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Kutubxona</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="toast-container"></div>
    
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <i data-lucide="library"></i>
            <span>Kutubxona</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Bosh sahifa</a>
            <a href="catalog.html">Kitoblar</a>
        </div>
        <div class="nav-auth" id="nav-auth-section"></div>
    </nav>

    <main id="app-root" class="animate-fade-in">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2 style="font-size: 2rem; margin-bottom: 2rem;">Mening Profilim</h2>
            
            <div style="background: var(--surface-color); padding: 2rem; border-radius: 16px; border: 1px solid var(--glass-border); margin-bottom: 2rem;">
                <div style="display: flex; align-items: center; gap: 1.5rem;">
                    <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--surface-hover); display: flex; align-items: center; justify-content: center;">
                        <i data-lucide="user" style="width: 40px; height: 40px; color: var(--text-secondary);"></i>
                    </div>
                    <div>
                        <h3 id="profile-name" style="font-size: 1.5rem; margin-bottom: 0.25rem;">Foydalanuvchi</h3>
                        <p id="profile-email" style="color: var(--text-secondary);">Yuklanmoqda...</p>
                    </div>
                </div>
            </div>

            <h3 style="margin-bottom: 1rem;">Band qilingan kitoblar</h3>
            <div style="background: var(--surface-color); border-radius: 16px; border: 1px solid var(--glass-border); padding: 2rem; text-align: center; color: var(--text-secondary);">
                Hozircha band qilingan kitoblar yo'q.
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 TATU Kutubxona. Barcha huquqlar himoyalangan.</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!app.token) {
                app.showToast("Avval tizimga kiring", "error");
                setTimeout(() => window.location.href = 'login.html', 1000);
                return;
            }

            try {
                const response = await app.apiCall('/accounts/profile/');
                const user = response.data;
                
                document.getElementById('profile-name').textContent = `${user.first_name || 'Foydalanuvchi'} ${user.last_name || ''}`;
                document.getElementById('profile-email').textContent = user.email || user.phone_number || '';
            } catch (error) {
                // if token is invalid
                app.logout();
            }
        });
    </script>
</body>
</html>
