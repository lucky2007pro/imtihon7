components:
  schemas:
    AIRequest:
      type: object
      properties:
        prompt:
          type: string
          description: Savolingizni kiriting
      required:
      - prompt
    AIResponse:
      type: object
      properties:
        success:
          type: boolean
        response:
          type: string
      required:
      - response
      - success
    AuthStatusEnum:
      enum:
      - new
      - code_verify
      - change_info
      - change_done
      type: string
      description: |-
        * `new` - new
        * `code_verify` - code_verify
        * `change_info` - change_info
        * `change_done` - change_done
    AuthTypeEnum:
      enum:
      - via_phone
      - via_email
      type: string
      description: |-
        * `via_phone` - via_phone
        * `via_email` - via_email
    Author:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        bio:
          type: string
          nullable: true
        created_time:
          type: string
          format: date-time
          readOnly: true
        updated_time:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_time
      - first_name
      - id
      - last_name
      - updated_time
    Book:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 200
        author:
          allOf:
          - $ref: '#/components/schemas/Author'
          readOnly: true
        author_id:
          type: string
          format: uuid
          writeOnly: true
          nullable: true
        section:
          allOf:
          - $ref: '#/components/schemas/Section'
          readOnly: true
        section_id:
          type: string
          format: uuid
          writeOnly: true
          nullable: true
        description:
          type: string
          nullable: true
        published_date:
          type: string
          format: date
          nullable: true
        isbn:
          type: string
          nullable: true
          maxLength: 13
        cover_image:
          type: string
          format: uri
          nullable: true
        pdf_file:
          type: string
          format: uri
          nullable: true
        total_copies:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: Kutubxonadagi jami nusxalar soni
        view_count:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        created_time:
          type: string
          format: date-time
          readOnly: true
        updated_time:
          type: string
          format: date-time
          readOnly: true
      required:
      - author
      - created_time
      - id
      - section
      - title
      - updated_time
    BookLike:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          type: string
          format: uuid
          readOnly: true
        user_name:
          type: string
          readOnly: true
        book:
          type: string
          format: uuid
        created_time:
          type: string
          format: date-time
          readOnly: true
      required:
      - book
      - created_time
      - id
      - user
      - user_name
    BookReview:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          type: string
          format: uuid
          readOnly: true
        user_name:
          type: string
          readOnly: true
        book:
          type: string
          format: uuid
        rating:
          allOf:
          - $ref: '#/components/schemas/RatingEnum'
          minimum: 0
          maximum: 9223372036854775807
        comment:
          type: string
          nullable: true
        created_time:
          type: string
          format: date-time
          readOnly: true
      required:
      - book
      - created_time
      - id
      - rating
      - user
      - user_name
    Borrowing:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          type: string
          format: uuid
